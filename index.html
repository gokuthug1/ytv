<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Thumbnail Viewer</title>
    <style>
        /* --- CSS Variables --- */
        :root {
            --primary-bg-color: #121212;
            --secondary-bg-color: #1c1c1c;
            --tertiary-bg-color: #2c2c2c;
            --text-color: #ffffff;
            --placeholder-text-color: #bbbbbb;
            --accent-color: #FF0000;
            --accent-hover-color: #CC0000;
            --accent-focus-outline-color: #FF3333;
            --error-color: #ff5252;
            --info-color: #4CAF50;
            --disabled-btn-bg-color: #555555;
            --border-radius-small: 5px;
            --border-radius-medium: 10px;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- General Layout & Typography --- */
        body {
            font-family: var(--font-family);
            background-color: var(--primary-bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
        }

        h1 {
            color: var(--accent-color);
            user-select: none;
            animation: textGlow 1.5s infinite alternate;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        /* --- Container & Animations --- */
        .container {
            text-align: center;
            background-color: var(--secondary-bg-color);
            padding: 30px;
            border-radius: var(--border-radius-medium);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            width: 90%;
            max-width: 550px;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 5px var(--accent-color); }
            to { text-shadow: 0 0 15px var(--accent-focus-outline-color); }
        }
        
        @keyframes fadeInImage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Form Elements --- */
        label {
            display: block;
            text-align: left;
            margin-bottom: 6px;
            font-size: 0.9em;
            color: #cccccc;
            font-weight: 500;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: var(--border-radius-small);
            background-color: var(--tertiary-bg-color);
            color: var(--text-color);
            border: 1px solid var(--tertiary-bg-color);
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        input[type="text"]::placeholder {
            color: var(--placeholder-text-color);
        }

        input[type="text"]:focus, 
        select:focus {
            outline: none;
            border-color: var(--accent-focus-outline-color);
            box-shadow: 0 0 5px rgba(255, 51, 51, 0.5);
        }

        .options-row {
            display: flex;
            gap: 15px;
        }
        .options-row > div {
            flex: 1;
        }

        /* --- Buttons --- */
        .button-group {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            background-color: var(--accent-color);
            padding: 12px 20px;
            border-radius: var(--border-radius-small);
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            color: var(--text-color);
            user-select: none;
            transition: transform 0.2s, background-color 0.3s;
            flex: 1;
            min-width: 140px;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent-hover-color);
            transform: translateY(-2px);
        }

        button:focus-visible { 
            outline: 2px solid var(--accent-focus-outline-color);
            outline-offset: 2px;
        }
        
        button:disabled {
            background-color: var(--disabled-btn-bg-color);
            color: #999;
            cursor: not-allowed;
            transform: none;
        }

        /* --- UI Components (Image, Messages) --- */
        #thumbnailImage {
            margin-top: 25px;
            max-width: 100%;
            border-radius: var(--border-radius-medium);
            display: none;
            animation: fadeInImage 0.5s ease-out;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--tertiary-bg-color);
        }
        
        .loading {
            display: none;
            color: var(--accent-color);
            font-style: italic;
            margin-top: 15px;
        }

        .message-box {
            margin-top: 15px;
            min-height: 1.2em;
            font-size: 0.95em;
            line-height: 1.4;
        }
        .error { color: var(--error-color); }
        .info { color: var(--info-color); }
    </style>
</head>
<body>

<div class="container">
    <h1>YouTube Thumbnail Viewer</h1>
    
    <form id="thumbnailForm">
        <label for="youtubeUrl">YouTube URL or Video ID:</label>
        <!-- Fixed Syntax Error in placeholder & aria-label -->
        <input type="text" id="youtubeUrl" placeholder="Paste URL or 11-character ID" aria-label="Enter YouTube URL or Video ID" required>
        
        <div class="options-row">
            <div>
                <label for="qualitySelector">Quality:</label>
                <select id="qualitySelector" aria-label="Select thumbnail quality">
                    <option value="auto">Auto (Best Available)</option>
                    <option value="maxresdefault">Max Res (1080p)</option>
                    <option value="sddefault">Standard (640p)</option>
                    <option value="hqdefault">High Quality (480p)</option>
                    <option value="mqdefault">Medium (360p)</option>
                    <option value="default">Default (120p)</option>
                </select>
            </div>
            <div>
                <label for="formatSelector">Format:</label>
                <select id="formatSelector" aria-label="Select thumbnail format">
                    <option value="jpg">JPG (Standard)</option>
                    <option value="webp">WebP (Modern)</option>
                </select>
            </div>
        </div>

        <div class="button-group">
            <button type="submit" id="viewButton">View</button>
            <button type="button" id="resetButton">Reset</button>
            <button type="button" id="downloadButton" disabled>Save Image</button>
        </div>
    </form>
    
    <div id="loadingMessage" class="loading" role="status">Fetching thumbnail...</div>
    <p id="messageBox" class="message-box" aria-live="polite"></p>
    <img id="thumbnailImage" alt="YouTube Thumbnail" draggable="false">
</div>

<script defer>
    'use strict';

    const ui = {
        form: document.getElementById('thumbnailForm'),
        urlInput: document.getElementById('youtubeUrl'),
        qualitySelector: document.getElementById('qualitySelector'),
        formatSelector: document.getElementById('formatSelector'),
        viewButton: document.getElementById('viewButton'),
        resetButton: document.getElementById('resetButton'),
        downloadButton: document.getElementById('downloadButton'),
        loadingMessage: document.getElementById('loadingMessage'),
        thumbnailImage: document.getElementById('thumbnailImage'),
        messageBox: document.getElementById('messageBox'),
    };

    function initialize() {
        ui.form.addEventListener('submit', handleFormSubmit);
        ui.resetButton.addEventListener('click', resetApp);
        ui.downloadButton.addEventListener('click', handleDownloadAction);
    }

    function handleFormSubmit(event) {
        event.preventDefault();
        fetchThumbnail();
    }

    function showMessage(msg, isError = true) {
        ui.messageBox.textContent = msg;
        ui.messageBox.className = `message-box ${isError ? 'error' : 'info'}`;
    }

    /**
     * Bulletproof Regex to extract 11-char Video ID from ANY YouTube URL format.
     */
    function extractVideoId(input) {
        input = input.trim();
        
        // 1. Check if input is exactly an 11-character Video ID
        if (/^[\w-]{11}$/.test(input)) return input;
        
        // 2. Extract from standard query parameters (e.g., watch?v=ID)
        const vMatch = input.match(/[?&]v=([\w-]{11})/);
        if (vMatch) return vMatch[1];
        
        // 3. Extract from paths (e.g., youtu.be/ID, /embed/ID, /shorts/ID, /live/ID, /v/ID)
        const pathMatch = input.match(/(?:youtu\.be\/|embed\/|shorts\/|live\/|v\/)([\w-]{11})/);
        if (pathMatch) return pathMatch[1];

        return null;
    }

    /**
     * Checks if image exists and is NOT YouTube's tiny generic fallback error image.
     */
    function checkImageValid(url) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                // FIXED BUG: YouTube returns a tiny 120x90 gray placeholder for missing HD images with a 200 OK status. 
                // This checks if the image returned is that specific ghost image.
                if (img.naturalWidth === 120 && img.naturalHeight === 90 && !url.includes('/default.')) {
                    resolve(false);
                } else {
                    resolve(true);
                }
            };
            img.onerror = () => resolve(false);
            img.src = url;
        });
    }
    
    function setLoadingState(isLoading) {
        ui.loadingMessage.style.display = isLoading ? 'block' : 'none';
        ui.viewButton.disabled = isLoading;
        ui.resetButton.disabled = isLoading;
    }
    
    function resetImage() {
        ui.thumbnailImage.style.display = 'none';
        ui.thumbnailImage.removeAttribute('src');
        ui.downloadButton.disabled = true;
    }

    async function fetchThumbnail() {
        setLoadingState(true);
        showMessage('');
        resetImage();

        const videoId = extractVideoId(ui.urlInput.value);
        const selectedQuality = ui.qualitySelector.value;
        const selectedFormat = ui.formatSelector.value;

        if (!videoId) {
            showMessage("Please enter a valid YouTube URL or Video ID.");
            setLoadingState(false);
            ui.urlInput.focus();
            return;
        }

        // Determine base URL based on requested format
        const baseUrl = selectedFormat === 'webp' 
            ? 'https://i.ytimg.com/vi_webp/' 
            : 'https://i.ytimg.com/vi/';

        let finalThumbnailUrl = '';
        
        try {
            if (selectedQuality === "auto") {
                // Safely cascade down from highest quality until a valid one is found
                const maxResUrl = `${baseUrl}${videoId}/maxresdefault.${selectedFormat}`;
                const sdUrl = `${baseUrl}${videoId}/sddefault.${selectedFormat}`;
                
                if (await checkImageValid(maxResUrl)) {
                    finalThumbnailUrl = maxResUrl;
                } else if (await checkImageValid(sdUrl)) {
                    finalThumbnailUrl = sdUrl;
                } else {
                    // hqdefault is heavily generated for all videos
                    finalThumbnailUrl = `${baseUrl}${videoId}/hqdefault.${selectedFormat}`;
                }
            } else {
                const specificUrl = `${baseUrl}${videoId}/${selectedQuality}.${selectedFormat}`;
                if (["maxresdefault", "sddefault"].includes(selectedQuality) && !(await checkImageValid(specificUrl))) {
                    showMessage(`The '${selectedQuality}' resolution is not available for this video. Try 'Auto'.`);
                    setLoadingState(false);
                    return;
                }
                finalThumbnailUrl = specificUrl;
            }

            ui.thumbnailImage.onload = () => {
                ui.thumbnailImage.style.display = 'block';
                ui.downloadButton.disabled = false;
                setLoadingState(false);
            };

            ui.thumbnailImage.onerror = () => {
                showMessage(`Failed to load thumbnail. The image may be restricted or unavailable.`);
                setLoadingState(false);
            };
            
            ui.thumbnailImage.src = finalThumbnailUrl;
        } catch (error) {
            console.error("Thumbnail error:", error);
            showMessage("An unexpected error occurred while fetching the thumbnail.");
            setLoadingState(false);
        }
    }

    /**
     * Bypasses the strict YouTube CORS block by opening the image in a new tab.
     */
    function handleDownloadAction() {
        const imgSrc = ui.thumbnailImage.src;
        if (!imgSrc || ui.thumbnailImage.style.display !== 'block') {
            showMessage("No thumbnail is displayed to save.");
            return;
        }
        
        // Because of strict CORS headers on i.ytimg.com, direct pure-JS downloading (blob/fetch) will fail.
        // The most foolproof client-side solution is opening in a new tab.
        window.open(imgSrc, '_blank', 'noopener,noreferrer');
        
        // Provide user instruction since we cannot trigger an auto-download
        showMessage("Image opened in a new tab. Right-click or long-press the image to save it.", false);
        
        setTimeout(() => {
            if (ui.messageBox.textContent.includes("Right-click")) {
                showMessage('');
            }
        }, 7000);
    }
    
    function resetApp() {
        if (ui.thumbnailImage.style.display === 'block') {
            ui.thumbnailImage.style.opacity = '0';
            setTimeout(performResetActions, 400); 
        } else {
            performResetActions();
        }
    }
    
    function performResetActions() {
        ui.form.reset(); 
        resetImage();
        ui.thumbnailImage.style.opacity = '1';
        ui.loadingMessage.style.display = 'none';
        showMessage('');
        setLoadingState(false);
        ui.urlInput.focus();
    }
    
    initialize();

</script>

</body>
</html>

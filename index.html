<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Thumbnail Viewer</title>
    <style>
        /* --- CSS Variables --- */
        :root {
            --primary-bg-color: #121212;
            --secondary-bg-color: #1c1c1c;
            --tertiary-bg-color: #2c2c2c;
            --text-color: #ffffff;
            --placeholder-text-color: #bbbbbb;
            --accent-color: #FF0000;
            --accent-hover-color: #CC0000;
            --accent-focus-outline-color: #FF3333;
            --error-color: #ff5252;
            --info-color: #4CAF50;
            --disabled-btn-bg-color: #555555;
            --border-radius-small: 5px;
            --border-radius-medium: 10px;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- General Layout & Typography --- */
        body {
            font-family: var(--font-family);
            background-color: var(--primary-bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
        }

        h1 {
            color: var(--accent-color);
            user-select: none;
            animation: textGlow 1.5s infinite alternate;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        /* --- Container & Animations --- */
        .container {
            text-align: center;
            background-color: var(--secondary-bg-color);
            padding: 30px;
            border-radius: var(--border-radius-medium);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            width: 90%;
            max-width: 550px;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 5px var(--accent-color); }
            to { text-shadow: 0 0 15px var(--accent-focus-outline-color); }
        }
        
        @keyframes fadeInImage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Form Elements --- */
        label {
            display: block;
            text-align: left;
            margin-bottom: 6px;
            font-size: 0.9em;
            color: #cccccc;
            font-weight: 500;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: var(--border-radius-small);
            background-color: var(--tertiary-bg-color);
            color: var(--text-color);
            border: 1px solid var(--tertiary-bg-color);
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        input[type="text"]::placeholder {
            color: var(--placeholder-text-color);
        }

        input[type="text"]:focus, 
        select:focus {
            outline: none;
            border-color: var(--accent-focus-outline-color);
            box-shadow: 0 0 5px rgba(255, 51, 51, 0.5);
        }

        /* --- Buttons --- */
        .button-group {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            background-color: var(--accent-color);
            padding: 12px 20px;
            border-radius: var(--border-radius-small);
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            color: var(--text-color);
            user-select: none;
            transition: transform 0.2s, background-color 0.3s;
            flex: 1;
            min-width: 140px;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent-hover-color);
            transform: translateY(-2px);
        }

        button:focus-visible { 
            outline: 2px solid var(--accent-focus-outline-color);
            outline-offset: 2px;
        }
        
        button:disabled {
            background-color: var(--disabled-btn-bg-color);
            color: #999;
            cursor: not-allowed;
            transform: none;
        }

        /* --- UI Components (Image, Messages) --- */
        #thumbnailImage {
            margin-top: 25px;
            max-width: 100%;
            border-radius: var(--border-radius-medium);
            display: none;
            animation: fadeInImage 0.5s ease-out;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--tertiary-bg-color);
        }
        
        .loading {
            display: none;
            color: var(--accent-color);
            font-style: italic;
            margin-top: 15px;
        }

        .message-box {
            margin-top: 15px;
            min-height: 1.2em;
            font-size: 0.95em;
            line-height: 1.4;
        }
        .error { color: var(--error-color); }
        .info { color: var(--info-color); }
    </style>
</head>
<body>

<div class="container">
    <h1>YouTube Thumbnail Viewer</h1>
    
    <form id="thumbnailForm">
        <label for="youtubeUrl">YouTube URL or Video ID:</label>
        <input type="text" id="youtubeUrl" placeholder="Paste URL or 11-character ID" aria-label="Enter YouTube URL or Video ID" required>
        
        <label for="qualitySelector">Select Thumbnail Quality:</label>
        <select id="qualitySelector" aria-label="Select thumbnail quality">
            <option value="auto">Auto (Best Available)</option>
            <option value="maxresdefault">Max Res (1080p)</option>
            <option value="sddefault">Standard (640p)</option>
            <option value="hqdefault">High Quality (480p)</option>
            <option value="mqdefault">Medium (360p)</option>
            <option value="default">Default (120p)</option>
        </select>

        <div class="button-group">
            <button type="submit" id="viewButton">View</button>
            <button type="button" id="resetButton">Reset</button>
            <button type="button" id="downloadButton" disabled>Download Thumbnail</button>
        </div>
    </form>
    
    <div id="loadingMessage" class="loading" role="status">Fetching thumbnail...</div>
    <p id="messageBox" class="message-box" aria-live="polite"></p>
    <img id="thumbnailImage" alt="YouTube Thumbnail" draggable="false">
</div>

<script defer>
    'use strict';

    const ui = {
        form: document.getElementById('thumbnailForm'),
        urlInput: document.getElementById('youtubeUrl'),
        qualitySelector: document.getElementById('qualitySelector'),
        viewButton: document.getElementById('viewButton'),
        resetButton: document.getElementById('resetButton'),
        downloadButton: document.getElementById('downloadButton'),
        loadingMessage: document.getElementById('loadingMessage'),
        thumbnailImage: document.getElementById('thumbnailImage'),
        messageBox: document.getElementById('messageBox'),
    };

    const THUMBNAIL_BASE_URL = 'https://i.ytimg.com/vi/';

    function initialize() {
        ui.form.addEventListener('submit', handleFormSubmit);
        ui.resetButton.addEventListener('click', resetApp);
        ui.downloadButton.addEventListener('click', downloadThumbnail);
    }

    function handleFormSubmit(event) {
        event.preventDefault();
        fetchThumbnail();
    }

    function showMessage(msg, isError = true) {
        ui.messageBox.textContent = msg;
        ui.messageBox.className = `message-box ${isError ? 'error' : 'info'}`;
    }

    /**
     * Bulletproof Regex to extract 11-char Video ID from ANY YouTube URL format.
     */
    function extractVideoId(input) {
        input = input.trim();
        
        if (/^[\w-]{11}$/.test(input)) return input;
        
        const vMatch = input.match(/[?&]v=([\w-]{11})/);
        if (vMatch) return vMatch[1];
        
        const pathMatch = input.match(/(?:youtu\.be\/|embed\/|shorts\/|live\/|v\/)([\w-]{11})/);
        if (pathMatch) return pathMatch[1];

        return null;
    }

    /**
     * Checks if image exists and is NOT YouTube's tiny generic fallback error image.
     */
    function checkImageValid(url) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                // Ignore the 120x90 placeholder unless the user explicitly requested the "default" (lowest) quality
                if (img.naturalWidth === 120 && img.naturalHeight === 90 && !url.includes('/default.jpg')) {
                    resolve(false);
                } else {
                    resolve(true);
                }
            };
            img.onerror = () => resolve(false);
            img.src = url;
        });
    }
    
    function setLoadingState(isLoading) {
        ui.loadingMessage.style.display = isLoading ? 'block' : 'none';
        ui.viewButton.disabled = isLoading;
        ui.resetButton.disabled = isLoading;
    }
    
    function resetImage() {
        ui.thumbnailImage.style.display = 'none';
        ui.thumbnailImage.removeAttribute('src');
        ui.downloadButton.disabled = true;
    }

    async function fetchThumbnail() {
        setLoadingState(true);
        showMessage('');
        resetImage();

        const videoId = extractVideoId(ui.urlInput.value);
        const selectedQuality = ui.qualitySelector.value;

        if (!videoId) {
            showMessage("Please enter a valid YouTube URL or Video ID.");
            setLoadingState(false);
            ui.urlInput.focus();
            return;
        }

        let finalThumbnailUrl = '';
        
        try {
            if (selectedQuality === "auto") {
                const maxResUrl = `${THUMBNAIL_BASE_URL}${videoId}/maxresdefault.jpg`;
                const sdUrl = `${THUMBNAIL_BASE_URL}${videoId}/sddefault.jpg`;
                
                if (await checkImageValid(maxResUrl)) {
                    finalThumbnailUrl = maxResUrl;
                } else if (await checkImageValid(sdUrl)) {
                    finalThumbnailUrl = sdUrl;
                } else {
                    finalThumbnailUrl = `${THUMBNAIL_BASE_URL}${videoId}/hqdefault.jpg`;
                }
            } else {
                const specificUrl = `${THUMBNAIL_BASE_URL}${videoId}/${selectedQuality}.jpg`;
                if (["maxresdefault", "sddefault"].includes(selectedQuality) && !(await checkImageValid(specificUrl))) {
                    showMessage(`The '${selectedQuality}' resolution is not available for this video. Try 'Auto'.`);
                    setLoadingState(false);
                    return;
                }
                finalThumbnailUrl = specificUrl;
            }

            ui.thumbnailImage.onload = () => {
                ui.thumbnailImage.style.display = 'block';
                ui.downloadButton.disabled = false;
                setLoadingState(false);
            };

            ui.thumbnailImage.onerror = () => {
                showMessage(`Failed to load thumbnail. The image may be restricted or unavailable.`);
                setLoadingState(false);
            };
            
            ui.thumbnailImage.src = finalThumbnailUrl;
        } catch (error) {
            console.error("Thumbnail error:", error);
            showMessage("An unexpected error occurred while fetching the thumbnail.");
            setLoadingState(false);
        }
    }

    /**
     * Generates a descriptive filename for the thumbnail.
     */
    function getFilenameForThumbnail(videoId, imageSrc) {
        let qualityKey = 'thumbnail';
        const qualityMatch = imageSrc.match(/\/(\w+default)\.jpg$/);
        if (qualityMatch) {
            qualityKey = qualityMatch[1];
        }
        return `${videoId}_${qualityKey}.jpg`;
    }

    /**
     * Directly downloads the currently displayed JPG thumbnail.
     */
    async function downloadThumbnail() {
        const videoId = extractVideoId(ui.urlInput.value);

        if (!ui.thumbnailImage.src || ui.thumbnailImage.style.display !== 'block') {
            showMessage("No thumbnail is displayed to download.");
            return;
        }
        if (!videoId) {
            showMessage("Cannot determine Video ID for filename.");
            return;
        }
        
        const originalButtonText = ui.downloadButton.textContent;
        ui.downloadButton.disabled = true;
        ui.downloadButton.textContent = 'Downloading...';

        try {
            const response = await fetch(ui.thumbnailImage.src, { mode: 'cors' });
            if (!response.ok) {
                throw new Error(`Network response was not ok: ${response.statusText}`);
            }
            const blob = await response.blob();
            const objectUrl = window.URL.createObjectURL(blob);
            
            const anchor = document.createElement('a');
            anchor.style.display = 'none';
            anchor.href = objectUrl;
            anchor.download = getFilenameForThumbnail(videoId, ui.thumbnailImage.src);
            
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
            window.URL.revokeObjectURL(objectUrl);
            showMessage(''); // Clear messages on success
        } catch (e) {
            console.error("Download error:", e);
            showMessage("Could not download the thumbnail. This might be a network or CORS issue.");
        } finally {
            ui.downloadButton.disabled = false;
            ui.downloadButton.textContent = originalButtonText;
        }
    }
    
    function resetApp() {
        if (ui.thumbnailImage.style.display === 'block') {
            ui.thumbnailImage.style.opacity = '0';
            setTimeout(performResetActions, 400); 
        } else {
            performResetActions();
        }
    }
    
    function performResetActions() {
        ui.form.reset(); 
        resetImage();
        ui.thumbnailImage.style.opacity = '1';
        ui.loadingMessage.style.display = 'none';
        showMessage('');
        setLoadingState(false);
        ui.urlInput.focus();
    }
    
    initialize();

</script>

</body>
</html>
